[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# Explicitly disable the Next.js plugin to avoid forms migration issues
# The hidden static form file (public/hidden-form.html) allows Netlify
# to detect form fields without requiring the plugin's form handling
[[plugins]]
  package = "@netlify/plugin-nextjs"
  enabled = false

